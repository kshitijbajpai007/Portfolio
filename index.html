  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;

    function useInView(threshold = 0.15) {
      const ref = useRef(null);
      const [visible, setVisible] = useState(false);
      useEffect(() => {
        const obs = new IntersectionObserver(
          ([e]) => { if (e.isIntersecting) { setVisible(true); obs.disconnect(); } },
          { threshold }
        );
        if (ref.current) obs.observe(ref.current);
        return () => obs.disconnect();
      }, [threshold]);
      return [ref, visible];
    }
  </script>

  <!-- 2. Components: UI Elements -->
  <script type="text/babel">
    function TerminalTyping() {
      const lines = [
        { type: 'cmd', text: 'whoami' },
        { type: 'out', text: 'Kshitij Bajpai, a product-minded-developer', highlight: true },
        { type: 'cmd', text: 'cat skills.json' },
        { type: 'out', text: '{ "focus": "UX-first engineering", "stack": ["React","Node","Flutter","AI"] }', highlight: true },
        { type: 'cmd', text: 'node --eval "console.log(\'available for hire\')"' },
        { type: 'out', text: 'available for hire ✓', highlight: true },
      ];

      const [displayed, setDisplayed] = useState([]);
      const [currentLine, setCurrentLine] = useState(0);
      const [currentChar, setCurrentChar] = useState(0);

      useEffect(() => {
        if (currentLine >= lines.length) return;
        const line = lines[currentLine];
        if (currentChar < line.text.length) {
          const t = setTimeout(() => {
            setCurrentChar(c => c + 1);
          }, line.type === 'cmd' ? 45 : 18);
          return () => clearTimeout(t);
        } else {
          const t = setTimeout(() => {
            setDisplayed(d => [...d, line]);
            setCurrentLine(l => l + 1);
            setCurrentChar(0);
          }, line.type === 'cmd' ? 400 : 200);
          return () => clearTimeout(t);
        }
      }, [currentLine, currentChar]);

      const currentLineData = lines[currentLine];
      const currentText = currentLineData ? currentLineData.text.slice(0, currentChar) : '';

      return (
        <div className="hero-terminal">
          <div className="terminal-bar">
            <div className="terminal-dot" style={{ background: '#ff5f57' }}></div>
            <div className="terminal-dot" style={{ background: '#febc2e' }}></div>
            <div className="terminal-dot" style={{ background: '#28c840' }}></div>
            <span className="terminal-title">~/portfolio — zsh</span>
          </div>
          {displayed.map((line, i) => (
            <div key={i}>
              {line.type === 'cmd' ? (
                <div className="terminal-line active">
                  <span className="terminal-prompt">❯</span>
                  {line.text}
                </div>
              ) : (
                <div className={`terminal-output${line.highlight ? ' highlight' : ''}`} style={{ marginBottom: '12px' }}>
                  {line.text}
                </div>
              )}
            </div>
          ))}
          {currentLine < lines.length && currentLineData && (
            <div className="terminal-line active">
              {currentLineData.type === 'cmd' ? (
                <><span className="terminal-prompt">❯</span>{currentText}<span className="cursor"></span></>
              ) : (
                <div className={`terminal-output${currentLineData.highlight ? ' highlight' : ''}`}>
                  {currentText}<span className="cursor"></span>
                </div>
              )}
            </div>
          )}
          {currentLine >= lines.length && (
            <div className="terminal-line active">
              <span className="terminal-prompt">❯</span>
              <span className="cursor"></span>
            </div>
          )}
        </div>
      );
    }

                </div>

                </div>

            </div>
          </div>

      );
    }

  <script type="text/babel">
    function TechCard({ icon, name, level, proficiency, delay }) {
      const [ref, visible] = useInView(0.1);

            <div className="tech-bar-fill" style={{ width: `${proficiency}%`, transitionDelay: `${delay * 0.1 + 0.3}s` }}></div>
          </div>
        </div>
      );
    }

    function ContactForm() {
      const [form, setForm] = useState({ name: '', email: '', type: '', budget: '', message: '' });
      const [status, setStatus] = useState('idle');
      const [errors, setErrors] = useState({});

      const validate = () => {
        const e = {};
        if (!form.name.trim()) e.name = 'Name required';
        if (!form.email.match(/^[^@]+@[^@]+\.[^@]+$/)) e.email = 'Valid email required';
        if (!form.message.trim()) e.message = 'Message required';
        return e;
      };

      const handleSubmit = async (e) => {
        e.preventDefault();
        const errs = validate();
        if (Object.keys(errs).length > 0) { setErrors(errs); return; }
        setStatus('loading');
        await new Promise(r => setTimeout(r, 1400));
        setStatus('success');
        setForm({ name: '', email: '', type: '', budget: '', message: '' });
        setErrors({});
      };

      const handle = (k) => (e) => {
        setForm(f => ({ ...f, [k]: e.target.value }));
        if (errors[k]) setErrors(er => ({ ...er, [k]: null }));
      };

      return (
        <div className="contact-form-wrap">
          <div style={{ marginBottom: '32px' }}>
            <div className="section-tag" style={{ marginBottom: '10px' }}>INQUIRE</div>
            <div style={{ fontFamily: 'var(--font-display)', fontSize: '24px', fontWeight: '700', letterSpacing: '-0.03em', color: 'var(--text-primary)' }}>
              Start a project
            </div>
          </div>
          <form onSubmit={handleSubmit}>
            <div className="form-row">
              <div className="form-group">
                <label className="form-label">YOUR NAME *</label>
                <input className="form-input" placeholder="Alex Chen" value={form.name} onChange={handle('name')} style={errors.name ? { borderColor: '#ff4444' } : {}} />
                {errors.name && <div style={{ fontSize: '11px', color: '#ff4444', marginTop: '6px', fontFamily: 'var(--font-mono)' }}>{errors.name}</div>}
              </div>
              <div className="form-group">
                <label className="form-label">EMAIL ADDRESS *</label>
                <input type="email" className="form-input" placeholder="hello@studio.com" value={form.email} onChange={handle('email')} style={errors.email ? { borderColor: '#ff4444' } : {}} />
                {errors.email && <div style={{ fontSize: '11px', color: '#ff4444', marginTop: '6px', fontFamily: 'var(--font-mono)' }}>{errors.email}</div>}
              </div>
            </div>
            <div className="form-row">
              <div className="form-group">
                <label className="form-label">PROJECT TYPE</label>
                <select className="form-select" value={form.type} onChange={handle('type')}>
                  <option value="">Select type...</option>
                  <option value="web">Web App / SaaS</option>
                  <option value="mobile">Mobile App (iOS/Android)</option>
                  <option value="landing">High-Conv. Landing Page</option>
                  <option value="tattoo">Tattoo Studio Website</option>
                  <option value="ecomm">E-Commerce</option>
                  <option value="other">Other</option>
                </select>
              </div>
              <div className="form-group">
                <label className="form-label">BUDGET RANGE</label>
                <select className="form-select" value={form.budget} onChange={handle('budget')}>
                  <option value="">Select budget...</option>
                  <option value="">$500 - $2000</option>
                  <option value="2-5k">$2K – $5K</option>
                  <option value="5-15k">$5K – $15K</option>
                  <option value="15-50k">$15K – $50K</option>
                  <option value="50k+">$50K+</option>
                  <option value="discuss">Let's discuss</option>
                </select>
              </div>
            </div>
            <div className="form-group">
              <label className="form-label">TELL ME ABOUT YOUR PROJECT *</label>
              <textarea className="form-textarea" placeholder="Describe your vision, goals, and any specific requirements..." value={form.message} onChange={handle('message')} style={errors.message ? { borderColor: '#ff4444' } : {}} />
              {errors.message && <div style={{ fontSize: '11px', color: '#ff4444', marginTop: '6px', fontFamily: 'var(--font-mono)' }}>{errors.message}</div>}
            </div>
            <button type="submit" className={`form-submit ${status === 'success' ? 'success' : ''}`} disabled={status === 'loading'}>
              {status === 'idle' && <><span>SEND INQUIRY</span><span>→</span></>}
              {status === 'loading' && <><span style={{ display: 'inline-block', animation: 'rotate 0.8s linear infinite' }}>⟳</span><span>SENDING...</span></>}
              {status === 'success' && <><span>✓</span><span>SENT SUCCESSFULLY</span></>}
            </button>
            <p className="form-note">{status === 'success' ? '// Response within 24 hours. Check your inbox.' : '// Encrypted. No spam. Response within 24h.'}</p>
          </form>
        </div>
      );
    }

    function Nav() {
      const [scrolled, setScrolled] = useState(false);
      useEffect(() => {
        const fn = () => setScrolled(window.scrollY > 40);
        window.addEventListener('scroll', fn);
        return () => window.removeEventListener('scroll', fn);
      }, []);
      return (
        <nav style={scrolled ? { boxShadow: '0 8px 40px rgba(0,0,0,0.4)' } : {}}>
          <a href="#" className="nav-logo">{'<Kshitij Bajpai>'}</a>

          <button className="nav-mobile-menu" aria-label="menu">
            <span></span><span></span><span></span>
          </button>
        </nav>
      );
    }
  </script>
